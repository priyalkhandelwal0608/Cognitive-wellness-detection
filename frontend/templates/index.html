<!DOCTYPE html>
<html>
<head>
    <title>Cognitive Wellness Companion</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; text-align: center; }
        .container { margin-top: 50px; }
        input, button { padding: 10px; margin: 5px; }
        .card { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cognitive Wellness AI Companion</h1>
        <form method="POST">
            <input type="text" name="text_input" placeholder="Type your mood/thoughts"><br>
            <input type="number" name="step_count" placeholder="Step Count"><br>
            <input type="number" name="heart_rate" placeholder="Heart Rate"><br>
            <button type="submit">Get Recommendation</button>
        </form>

        {% if state %}
        <div class="card">
            <h2>Detected State: {{ state }}</h2>
            <p><strong>Recommendation:</strong> {{ recommendation }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
